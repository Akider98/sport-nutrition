<script>
// ─── STOCKAGE HYBRIDE : localStorage + Google Sheets ─────────────────────────
// Lecture : localStorage si dispo, sinon Google Sheets (fetch JSON)
// Écriture : localStorage immédiat + Google Sheets en arrière-plan
// Fonctionne depuis https:// (GitHub Pages) ET file:// (local)

const GS_URL = "https://script.google.com/macros/s/AKfycbwLeZqLV7SHMdsmadkAsBozX_VOgtwcVELTDifEGU59fFp80I2kNKWlEq8CGpf5N4Do-A/exec";
const LS_PREFIX = "ds_";
const IS_LOCAL = window.location.protocol === 'file:';

// Indicateur visuel
const syncBar = document.getElementById('sync-bar');
let pendingWrites = 0;
let syncTimer = null;
function showSync(state) {
  syncBar.className = state;
  clearTimeout(syncTimer);
  if (state !== '') syncTimer = setTimeout(()=>{ syncBar.className=''; }, 2000);
}
function updateSync() {
  showSync(pendingWrites > 0 ? 'syncing' : '');
}

// ── localStorage ──────────────────────────────────────────────────────────────
function lsGet(key) {
  try {
    const prefixes = [LS_PREFIX, 'dash_', ''];
    for (const p of prefixes) {
      const v = localStorage.getItem(p + key);
      if (v !== null) return v;
    }
    return null;
  } catch { return null; }
}

function lsSet(key, valueStr) {
  try { localStorage.setItem(LS_PREFIX + key, valueStr); } catch {}
}

// ── Google Sheets lecture (fetch JSON, seulement depuis https://) ─────────────
function gsRead(key) {
  if (IS_LOCAL) return Promise.resolve(null);
  return fetch(GS_URL + '?key=' + encodeURIComponent(key), {
    method: 'GET',
    mode: 'cors',
  })
  .then(r => r.json())
  .then(data => {
    if (data && data.ok && data.value !== null && data.value !== undefined) {
      // Met en cache dans localStorage pour les prochaines ouvertures
      lsSet(key, typeof data.value === 'string' ? data.value : JSON.stringify(data.value));
      return typeof data.value === 'string' ? data.value : JSON.stringify(data.value);
    }
    return null;
  })
  .catch(() => null);
}

// ── Google Sheets écriture (no-cors, fire-and-forget) ────────────────────────
function gsWrite(key, valueStr) {
  if (IS_LOCAL) return; // pas d'envoi depuis file://
  pendingWrites++;
  updateSync();
  fetch(GS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ key, value: valueStr }),
  })
  .then(() => { pendingWrites = Math.max(0, pendingWrites-1); updateSync(); })
  .catch(() => { pendingWrites = Math.max(0, pendingWrites-1); updateSync(); });
}

// ── Interface window.storage ──────────────────────────────────────────────────
window.storage = {
  get: async (key) => {
    // 1. Essaie localStorage d'abord (instantané)
    const local = lsGet(key);
    if (local !== null) {
      // En arrière-plan, vérifie si Google Sheets a une version plus récente
      if (!IS_LOCAL) {
        gsRead(key).then(remote => {
          if (remote !== null && remote !== local) {
            // Mise à jour silencieuse du localStorage si GS est différent
            lsSet(key, remote);
          }
        });
      }
      return { key, value: local };
    }
    // 2. Si localStorage vide, tente Google Sheets (premier lancement sur nouvel appareil)
    if (!IS_LOCAL) {
      showSync('syncing');
      const remote = await gsRead(key);
      showSync('');
      if (remote !== null) return { key, value: remote };
    }
    return null;
  },
  set: async (key, valueStr) => {
    // Écriture locale immédiate
    lsSet(key, valueStr);
    // Envoi GS en arrière-plan
    gsWrite(key, valueStr);
    return { key, value: valueStr };
  }
};
</script>

function todayKey() { return new Date().toISOString().split("T")[0]; }

function getWeekDates(offset = 0) {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7) + offset * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().split("T")[0];
  });
}

// Clé unique par semaine calendaire
function weekKey(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${STORAGE_KEYS.weekProgram}_${d.getFullYear()}-W${String(weekNum).padStart(2,"0")}`;
}

// Migration automatique depuis les anciennes clés vers les clés permanentes
async function migrateStorage() {
  const oldKeys = [
    {old:"sess_v4_gs",       new:STORAGE_KEYS.sessions},
    {old:"sess_v4",          new:STORAGE_KEYS.sessions},
    {old:"food_v4_gs",       new:STORAGE_KEYS.foods},
    {old:"food_v4",          new:STORAGE_KEYS.foods},
    {old:"perf_v4_gs",       new:STORAGE_KEYS.perf},
    {old:"perf_v4",          new:STORAGE_KEYS.perf},
    {old:"poids_hist_v1",    new:STORAGE_KEYS.poidsHist},
    {old:"fav_repas_v1",     new:STORAGE_KEYS.favRepas},
  ];
  for (const {old, new: newKey} of oldKeys) {
    try {
      // Vérifie si la nouvelle clé existe déjà
      const existing = await window.storage.get(newKey);
      if (existing?.value) continue; // déjà migré
      // Cherche l'ancienne clé
      const oldData = await window.storage.get(old);
      if (oldData?.value) {
        await window.storage.set(newKey, oldData.value);
        console.log(`Migré: ${old} → ${newKey}`);
      }
    } catch {}
  }
}

function useStorage(key, def) {
  const [val, setVal] = useState(def);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get(key); if (r?.value) setVal(JSON.parse(r.value)); }
      catch {}
      setReady(true);
    })();
  }, [key]);
  const save = useCallback(async (v) => {
    setVal(v);
    try { await window.storage.set(key, JSON.stringify(v)); } catch {}
  }, [key]);
  return [val, save, ready];
}

// ─── RECHERCHE FLOUE (normalisation accents + Levenshtein) ───────────────────
function normalise(str) {
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // supprime accents
    .replace(/[œ]/g,"oe").replace(/[æ]/g,"ae")
    .replace(/['']/g,"'");
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzySearch(query, items, catFilter) {
  if (!query && catFilter === "Tout") return items.slice(0, 12);
  const q = normalise(query);
  const filtered = catFilter !== "Tout" ? items.filter(f=>f.cat===catFilter) : items;
  if (!q) return filtered.slice(0, 12);

  return filtered
    .map(f => {
      const name = normalise(f.name);
      // Score : 0=exact, 1=commence par, 2=contient, 3+=distance Levenshtein
      let score;
      if (name === q) score = 0;
      else if (name.startsWith(q)) score = 1;
      else if (name.includes(q)) score = 2;
      else {
        // Vérifie si un mot du nom contient la requête
        const words = name.split(/[\s,()-]+/);
        const wordMatch = words.some(w => w.includes(q) || q.includes(w) && w.length > 2);
        if (wordMatch) score = 3;
        else {
          // Levenshtein sur le nom complet (pour tolérer les fautes de frappe)
          const dist = levenshtein(q, name.slice(0, q.length + 3));
          score = dist <= 2 ? 4 + dist : 99;
        }
      }
      return {f, score};
    })
    .filter(({score}) => score < 99)
    .sort((a,b) => a.score - b.score)
    .slice(0, 12)
    .map(({f}) => f);
}

// ─── VALIDATION ──────────────────────────────────────────────────────────────
function validateNum(val, {min=0, max=9999, label=""}={}) {
  const n = parseFloat(val);
  if (val === "" || val === undefined) return null; // champ vide = ok
  if (isNaN(n)) return `${label} doit être un nombre`;
  if (n < min) return `${label} doit être ≥ ${min}`;
  if (n > max) return `${label} doit être ≤ ${max}`;
  return null;
}

function InputField({label, value, onChange, placeholder, type="number", step, min, max, validLabel, style={}}) {
  const [touched, setTouched] = useState(false);
  const err = touched ? validateNum(value, {min, max, label:validLabel||label}) : null;
  return (
    <div style={{marginBottom:"0"}}>
      {label && <div style={S.label}>{label}</div>}
      <input
        value={value} type={type} step={step}
        onChange={e=>{ onChange(e.target.value); }}
        onBlur={()=>setTouched(true)}
        placeholder={placeholder}
        style={{...S.input, ...style, border:`1.5px solid ${err?C.red:C.border}`}}
      />
      {err && <div style={{fontSize:"10px",color:C.red,marginTop:"3px"}}>{err}</div>}
    </div>
  );
}

  }

  // Calories brûlées réellement loggées pour un jour
  // Course : formule Minetti (0.9 kcal/kg/km) si allure connue, sinon MET
  // Calisthénie : coefficient ×0.5 pour compenser les temps de repos
  function calBrulees(dk) {
    const sess = sessions[dk];
    if (!sess || !sess.done || sess.estRepos) return 0;
    const ACTIVITES_MET = {course_ef:9, fractionne:12, calistenie:5, marche:4, velo:8, natation:8, yoga:3, autre:5};
    const CALI_EXOS_KCAL = {planche:3.5,planche_lat:3.0,releve_jambes:4.0,tuck_lsit:4.5,traction_neg:5.5,traction:6.0,dead_hang:3.0,dips:5.0,pompes:4.5,pike_pushup:4.0,squat:5.0,fentes:5.0,gainage_total:4.0,burpees:8.0,mountain_cl:7.0};
    const poids = 78;
    const activites = sess.activites || [];
    const durees = sess.durees || {};
    const allures = sess.allures || {};
    const exosCali = sess.exosCali || [];
    let total = 0;
    activites.forEach(actId => {
      const dur = parseFloat(durees[actId]) || 0;
      if (dur === 0) return;
      if ((actId === "course_ef" || actId === "fractionne") && allures[actId]) {
        // Formule Minetti
        const allureMin = parseFloat(allures[actId]);
        if (!isNaN(allureMin) && allureMin > 0) {
          const vitesseKmh = 60 / allureMin;
          const distKm = vitesseKmh * (dur / 60);
          const coeff = allureMin < 5 ? 1.08 : 1.0;
          total += Math.round(0.9 * poids * distKm * coeff);
          return;
        }
      }
      if (actId === "calistenie") {
        if (exosCali.length > 0) {
          const avgKcal = exosCali.reduce((s,eid)=>s+(CALI_EXOS_KCAL[eid]||5),0) / exosCali.length;
          total += Math.round(avgKcal * dur * 0.5);
        } else {
          total += Math.round((ACTIVITES_MET.calistenie * poids * dur * 0.5) / 200);
        }
      } else {
        const met = ACTIVITES_MET[actId] || 5;
        total += Math.round((met * poids * dur) / 200);
      }
    });
    return total;
  }

        <div style={{fontSize:"9px",letterSpacing:"4px",color:C.textMuted,marginBottom:"4px",fontFamily:"monospace"}}>PROGRAMME 8 SEMAINES</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div style={{fontSize:"22px",fontWeight:"400",color:C.text,letterSpacing:"-0.3px"}}>Sport & Nutrition</div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"9px",color:C.textMuted,letterSpacing:"2px",marginBottom:"2px"}}>SEMAINE</div>
            <div style={{fontSize:"28px",fontWeight:"300",lineHeight:1,color:weekDone>=6?C.green:C.gold}}>
              {weekDone}<span style={{fontSize:"13px",color:C.textMuted}}>/6</span>
            </div>
          </div>
        </div>
        <div style={{marginTop:"12px",height:"3px",background:"#333",borderRadius:"2px"}}>
          <div style={{height:"100%",width:`${Math.min(100,weekDone/6*100)}%`,background:`linear-gradient(90deg,${C.gold},${C.goldLight})`,borderRadius:"2px",transition:"width .5s"}}/>
        </div>
      </div>

      {/* ── NAV ── */}
      <div style={{display:"flex",background:"#111",borderBottom:`2px solid ${C.border}`,overflowX:"auto"}}>
        {[["semaine","Sport"],["alimentation","Aliments"],["progres","Progrès"],["historique","Historique"],["reference","Référence"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            flexShrink:0,padding:"13px 10px",background:"none",border:"none",
            borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent",
            color:tab===id?C.gold:C.textMuted,
            fontSize:"9px",letterSpacing:"1px",textTransform:"uppercase",cursor:"pointer",fontFamily:"monospace",fontWeight:"600",
          }}>{label}</button>
        ))}
      </div>

      <div style={{padding:"16px 16px 90px"}}>

        {/* ══ SEMAINE ══ */}
        {tab==="semaine" && <>
          {/* ── Indicateur de rythme ── */}
          {wk === 0 && (()=>{
            const stats = weekStats();
            const TARGET_COURSE = 3, TARGET_CALI = 3;
            const missingCourse = Math.max(0, TARGET_COURSE - stats.courseCount);
            const missingCali = Math.max(0, TARGET_CALI - stats.caliCount);
            const dayOfWeek = (new Date().getDay() + 6) % 7; // 0=lun, 6=dim
            const isLate = dayOfWeek >= 4; // jeudi+

            return (
              <div style={{...S.cardHi, padding:"13px 14px", marginBottom:"14px"}}>
                <div style={{fontSize:"9px",letterSpacing:"2px",color:C.textMuted,marginBottom:"10px",textTransform:"uppercase",fontFamily:"monospace"}}>Objectif semaine</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                  {[
                    { label:"Course", done:stats.courseCount, target:TARGET_COURSE, icon:"◎", col:C.blue },
                    { label:"Calisthénie", done:stats.caliCount, target:TARGET_CALI, icon:"◈", col:C.gold },
                  ].map(({label,done,target,icon,col})=>{
                    const ok = done >= target;
                    const warn = !ok && isLate;
                    return (
                      <div key={label} style={{background:"#111",borderRadius:"6px",padding:"10px 12px",border:`1px solid ${ok?C.green:warn?C.gold:C.border}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                          <span style={{fontSize:"11px",color:ok?C.green:warn?C.gold:C.textSub,fontWeight:"600"}}>{icon} {label}</span>
                          <span style={{fontSize:"14px",fontFamily:"monospace",color:ok?C.green:warn?C.gold:C.text,fontWeight:"700"}}>{done}/{target}</span>
                        </div>
                        <div style={{display:"flex",gap:"4px"}}>
                          {Array.from({length:target}).map((_,i)=>(
                            <div key={i} style={{flex:1,height:"5px",borderRadius:"3px",background:i<done?(ok?C.green:col):"#333"}}/>
                          ))}
                        </div>
                        {warn && <div style={{fontSize:"9px",color:C.gold,marginTop:"5px"}}>⚠️ {target-done} séance{target-done>1?"s":""} manquante{target-done>1?"s":""}</div>}
                        {ok && <div style={{fontSize:"9px",color:C.green,marginTop:"5px"}}>✓ Objectif atteint</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* ── Navigation semaine ── */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <button onClick={()=>setWk(w=>w-1)} style={S.navBtn}>←</button>
            <span style={{fontSize:"10px",letterSpacing:"3px",color:C.textSub,textTransform:"uppercase",fontFamily:"monospace"}}>
              {wk===0?"Cette semaine":wk===-1?"Semaine passée":`S ${wk>0?"+":""}${wk}`}
            </span>
            <button onClick={()=>setWk(w=>w+1)} style={S.navBtn}>→</button>
          </div>

          {/* ── Jours ── */}
          {weekDates.map((dk,i) => {
            const plan = getPlanForDate(dk);
            const isOverridden = (()=>{
              const dates = getWeekDates(wk);
              const wkKey = weekKey(dates[0]);
              return weekOverrides[wkKey] && weekOverrides[wkKey][i] !== undefined;
            })();
            const done = sessions[dk]?.done;
            const isToday = dk===today;
            const d = new Date(dk+"T12:00:00");
            const {cal,prot} = dayTotals(dk);
            const def = deficit(dk);
            const burned = calBrulees(dk);
            return (
              <div key={dk} style={{
                ...S.card,
                padding:"11px 12px",marginBottom:"6px",
                display:"flex",alignItems:"center",gap:"10px",
                border:isToday?`1.5px solid ${C.gold}`:S.card.border,
                background:isToday?C.cardHi:C.card,
              }}>
                {/* Jour */}
                <div style={{width:"34px",flexShrink:0,textAlign:"center"}}>
                  <div style={{fontSize:"11px",fontWeight:"700",color:isToday?C.gold:C.textSub,fontFamily:"monospace"}}>{DAYS_SHORT[i]}</div>
                  <div style={{fontSize:"10px",color:C.textMuted,marginTop:"1px"}}>{d.getDate()}/{d.getMonth()+1}</div>
                </div>

                {/* Icône séance — adapte à ce qui est fait si loggé */}
                <div style={{fontSize:"17px",color:done?C.green:plan.color,flexShrink:0}}>
                  {done?(sessions[dk]?.estRepos?"◇":"✓"):plan.icon}
                </div>

                {/* Infos */}
                <div style={{flex:1,minWidth:0}}>
                  {done ? (
                    /* ── SÉANCE LOGGÉE : ce qui est fait en premier ── */
                    sessions[dk]?.estRepos ? (
                      <div>
                        <div style={{fontSize:"13px",color:C.text,fontWeight:"600"}}>Repos / Récupération</div>
                        <div style={{fontSize:"10px",color:C.textMuted,marginTop:"2px"}}>
                          Prévu : {plan.label}
                          {sessions[dk]?.note ? ` · ${sessions[dk].note}` : ""}
                        </div>
                      </div>
                    ) : sessions[dk]?.activites?.length ? (
                      <div>
                        {/* Activité(s) réalisée(s) — mis en avant */}
                        <div style={{fontSize:"13px",color:C.green,fontWeight:"700"}}>
                          {sessions[dk].activites.map(a=>{
                            const LABELS={course_ef:"Course EF",fractionne:"Fractionné",calistenie:"Calisthénie",marche:"Marche",velo:"Vélo",natation:"Natation",yoga:"Yoga",autre:sessions[dk].activiteCustom||"Autre"};
                            const dur = sessions[dk].durees?.[a];
                            const allure = sessions[dk].allures?.[a];
                            return LABELS[a]+(dur?` ${dur}min`:"")+(allure?` · ${allure}/km`:"");
                          }).join(" + ")} {RESSENTI[+sessions[dk].ressenti]}
                        </div>
                        {/* Prévu — relégué en petit */}
                        <div style={{fontSize:"10px",color:C.textMuted,marginTop:"2px"}}>
                          {plan.label !== sessions[dk].activites.map(a=>({course_ef:"Course EF",fractionne:"Fractionné",calistenie:"Calisthénie",marche:"Marche",velo:"Vélo",natation:"Natation",yoga:"Yoga",autre:"Autre"}[a])).join("+")
                            ? `Prévu : ${plan.label}` : plan.detail}
                          {isOverridden && <span style={{color:C.gold,marginLeft:"4px"}}>· modifié</span>}
                        </div>
                        {/* Nutrition */}
                        {cal>0 && (
                          <div style={{display:"flex",gap:"8px",marginTop:"4px",flexWrap:"wrap"}}>
                            <span style={{fontSize:"10px",color:def!==null&&def>200?C.green:def!==null&&def<-50?C.red:C.textSub}}>
                              {cal} kcal{burned>0?` · 🏃${burned}`:""} {def!==null?(def>0?`−${def}`:`+${Math.abs(def)}!`):""}
                            </span>
                            <span style={{fontSize:"10px",color:prot>=160?C.blue:C.textMuted}}>{prot}g prot.</span>
                          </div>
                        )}
                      </div>
                    ) : null
                  ) : (
                    /* ── NON LOGGÉ : programme prévu en premier (comportement actuel) ── */
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <span style={{fontSize:"13px",color:C.text,fontWeight:"500"}}>{plan.label}</span>
                        {isOverridden && <span style={{fontSize:"9px",color:C.gold,background:"#2a2000",padding:"1px 5px",borderRadius:"3px",fontFamily:"monospace"}}>modifié</span>}
                      </div>
                      <div style={{fontSize:"10px",color:C.textMuted,marginTop:"1px"}}>{plan.detail}</div>
                      {cal>0 && (
                        <div style={{display:"flex",gap:"8px",marginTop:"4px",flexWrap:"wrap"}}>
                          <span style={{fontSize:"10px",color:def!==null&&def>200?C.green:def!==null&&def<-50?C.red:C.textSub}}>
                            {cal} kcal{burned>0?` 🏃${burned}`:""} {def!==null?(def>0?`−${def}`:`+${Math.abs(def)}!`):""}
                          </span>
                          <span style={{fontSize:"10px",color:prot>=160?C.blue:C.textMuted}}>{prot}g prot.</span>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* Boutons */}
                <div style={{display:"flex",flexDirection:"column",gap:"4px",flexShrink:0}}>
                  {/* Éditer le programme prévu */}
                  <button onClick={()=>setEditDay({dateKey:dk,dayIdx:i})} title="Modifier la séance prévue" style={{
                    background:"#1e1e1e",border:`1px solid ${C.border}`,
                    color:isOverridden?C.gold:C.textMuted,
                    padding:"4px 7px",borderRadius:"4px",fontSize:"11px",cursor:"pointer",
                  }}>✏️</button>
                  {/* Logger la séance */}
                  <button onClick={()=>{
                    setSessModal(dk);
                    const ex=sessions[dk]||{};
                    const defaultActivites = ex.activites || (plan.type==="repos"?[]:(plan.type==="course"?(plan.label.includes("Fractionné")?["fractionne"]:["course_ef"]):["calistenie"]));
                    setSessForm({duree:ex.duree||"",ressenti:ex.ressenti||"3",note:ex.note||"",activites:defaultActivites,activiteCustom:ex.activiteCustom||"",estRepos:ex.estRepos||false,durees:ex.durees||{},exosCali:ex.exosCali||[],allures:ex.allures||{}});
                  }} style={{
                    background:done?"#1a3a12":"#1e1e1e",
                    border:done?`1.5px solid ${C.green}`:`1.5px solid ${C.border}`,
                    color:done?C.green:C.textMuted,padding:"5px 8px",borderRadius:"5px",fontSize:"11px",cursor:"pointer",fontWeight:done?"700":"400",
                  }}>{done?"✓":"Logger"}</button>
                  {/* Aliments */}
                  <button onClick={()=>{setFoodDate(dk);setTab("alimentation");}} style={{
                    background:cal>0?"#102030":"#1e1e1e",border:cal>0?`1.5px solid ${C.blue}`:`1.5px solid ${C.border}`,
                    color:cal>0?C.blue:C.textMuted,padding:"4px 7px",borderRadius:"4px",fontSize:"12px",cursor:"pointer",
                  }}>🍽</button>
                </div>
              </div>
            );
          })}

          {/* ── Modal édition du programme d'un jour ── */}
          {editDay && (()=>{
            const {dateKey, dayIdx} = editDay;
            const d = new Date(dateKey+"T12:00:00");
            const current = getPlanForDate(dateKey);
            const stats = weekStats();
            const missingCourse = Math.max(0, 3 - stats.courseCount);
            const missingCali = Math.max(0, 3 - stats.caliCount);

            return (
              <div style={{position:"fixed",inset:0,background:C.overlay,zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
                onClick={()=>setEditDay(null)}>
                <div onClick={e=>e.stopPropagation()} style={{background:"#1a1a1a",border:`2px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:"22px 18px",width:"100%",maxWidth:"480px",maxHeight:"85vh",overflowY:"auto"}}>
                  <div style={{fontSize:"10px",letterSpacing:"3px",color:C.textMuted,marginBottom:"6px",textTransform:"uppercase",fontFamily:"monospace"}}>
                    Programme · {DAYS_FULL[dayIdx]} {d.getDate()}/{d.getMonth()+1}
                  </div>
                  <div style={{fontSize:"11px",color:C.textSub,marginBottom:"16px"}}>
                    Actuellement prévu : <span style={{color:current.color,fontWeight:"600"}}>{current.icon} {current.label}</span>
                  </div>

                  <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                    {SEANCE_OPTIONS.map(opt=>{
                      const isCurrent = current.label === opt.label && current.type === opt.type;
                      // Recommandation intelligente
                      const isRecommended =
                        (opt.type==="course" && missingCourse > 0 && opt.type !== current.type) ||
                        (opt.type==="calistenie" && missingCali > 0 && opt.type !== current.type);

                      return (
                        <button key={opt.label} onClick={()=>saveDayOverride(dateKey, dayIdx, opt)} style={{
                          display:"flex",alignItems:"center",gap:"12px",
                          padding:"11px 14px",
                          background: isCurrent ? "#2a2000" : isRecommended ? "#0a1a08" : "#111",
                          border: isCurrent ? `1.5px solid ${C.gold}` : isRecommended ? `1.5px solid ${C.green}` : `1px solid ${C.border}`,
                          borderRadius:"8px",cursor:"pointer",textAlign:"left",
                        }}>
                          <span style={{fontSize:"18px",color:opt.color,flexShrink:0}}>{opt.icon}</span>
                          <div style={{flex:1}}>
                            <div style={{fontSize:"13px",color:isCurrent?C.gold:C.text,fontWeight:isCurrent?"700":"500"}}>{opt.label}</div>
                            <div style={{fontSize:"10px",color:C.textMuted,marginTop:"1px"}}>{opt.detail}</div>
                          </div>
                          {isCurrent && <span style={{fontSize:"10px",color:C.gold,fontFamily:"monospace"}}>actuel</span>}
                          {isRecommended && !isCurrent && (
                            <span style={{fontSize:"9px",color:C.green,background:"#0a2010",padding:"2px 6px",borderRadius:"3px",fontFamily:"monospace"}}>
                              recommandé · {opt.type==="course"?`${missingCourse} course${missingCourse>1?"s":""} manquante${missingCourse>1?"s":""}`:
                              `${missingCali} cali${missingCali>1?"s":""} manquante${missingCali>1?"s":""}`}
                            </span>
                          )}
                        </button>
                      );
                    })}
                  </div>

                  {/* Réinitialiser */}
                  {(()=>{
                    const dates = getWeekDates(wk);
                    const wkKey = weekKey(dates[0]);
                    const hasOverride = weekOverrides[wkKey] && weekOverrides[wkKey][dayIdx] !== undefined;
                    return hasOverride ? (
                      <button onClick={()=>resetDayOverride(dateKey,dayIdx)} style={{width:"100%",marginTop:"12px",padding:"10px",background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:"6px",fontSize:"11px",cursor:"pointer"}}>
                        ↺ Revenir au programme par défaut
                      </button>
                    ) : null;
                  })()}
                </div>
              </div>
            );
          })()}
        </>}

        {/* ══ ALIMENTATION ══ */}
        {tab==="alimentation" && <>
          {/* Alerte protéines en temps réel */}
          {(()=>{
            const {prot} = dayTotals(foodDate);
            const manquant = 160 - prot;
            if (foodDate !== today || prot === 0) return null;
            if (manquant <= 0) return (
              <div style={{padding:"10px 14px",background:"#0a2010",border:`1.5px solid ${C.green}`,borderRadius:"8px",marginBottom:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:"12px",color:C.green,fontWeight:"600"}}>✓ Cible protéines atteinte ({prot}g)</span>
              </div>
            );
            // Suggestions pour combler le manque
            const suggestions = [
              {name:"Skyr 200g",prot:22},{name:"Œufs brouillés (2)",prot:16},{name:"Tofu ferme 150g",prot:24},
              {name:"Fromage blanc 200g",prot:18},{name:"Lentilles 200g",prot:18}
            ];
            const sugg = suggestions.find(s=>s.prot>=manquant*0.6 && s.prot<=manquant*1.4) || suggestions[0];
            return (
              <div style={{padding:"10px 14px",background:"#201000",border:`1.5px solid ${C.gold}`,borderRadius:"8px",marginBottom:"10px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:"12px",color:C.gold,fontWeight:"600"}}>⚠️ Il manque {manquant}g de protéines</span>
                  <span style={{fontSize:"11px",color:C.textSub}}>{prot}g / 160g min</span>
                </div>
                <div style={{fontSize:"10px",color:C.textMuted,marginTop:"5px"}}>
                  → Ex : {sugg.name} ≈ {sugg.prot}g prot.
                </div>
              </div>
            );
          })()}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
            <button onClick={()=>{const d=new Date(foodDate+"T12:00:00");d.setDate(d.getDate()-1);setFoodDate(d.toISOString().split("T")[0]);}} style={S.navBtn}>←</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:"10px",letterSpacing:"3px",color:C.textSub,textTransform:"uppercase",fontFamily:"monospace"}}>
                {foodDate===today?"Aujourd'hui":(()=>{const d=new Date(foodDate+"T12:00:00");return `${DAYS_FULL[(d.getDay()+6)%7]} ${d.getDate()}/${d.getMonth()+1}`;})()}
              </div>
            </div>
            <button onClick={()=>{const d=new Date(foodDate+"T12:00:00");d.setDate(d.getDate()+1);setFoodDate(d.toISOString().split("T")[0]);}} style={S.navBtn}>→</button>
          </div>

          {/* Summary */}
          {(()=>{
            const {cal,prot}=dayTotals(foodDate);
            const burned=calBrulees(foodDate);
            const tgt=targetCal(foodDate);
            const def=tgt-cal;
            const hasSport = burned > 0;
            const hasSportManuel = foodDate===today && parseFloat(sportManuel)>0 && burned===0;
            return (
              <div style={{...S.cardHi,padding:"16px",marginBottom:"14px"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"14px"}}>
                  {[
                    {val:cal||"—",label:"Kcal mangées",color:C.gold},
                    {val:prot?`${prot}g`:"—",label:"Protéines",color:C.blue},
                    {val:cal===0?"—":def>0?`−${def}`:`+${Math.abs(def)}`,label:"Écart dépense",color:cal===0?C.textMuted:def>200?C.green:def>0?C.gold:C.red},
                  ].map(x=>(
                    <div key={x.label} style={{textAlign:"center"}}>
                      <div style={{fontSize:"22px",fontWeight:"300",color:x.color}}>{x.val}</div>
                      <div style={{fontSize:"9px",color:C.textMuted,letterSpacing:"1px",fontFamily:"monospace",marginTop:"2px"}}>{x.label}</div>
                    </div>
                  ))}
                </div>
                {hasSport && (
                  <div style={{fontSize:"10px",color:C.green,marginBottom:"8px",fontFamily:"monospace",textAlign:"center"}}>
                    🏃 {burned} kcal brûlées (loggées) · cible : {tgt} kcal
                  </div>
                )}
                {/* Dépense réelle configurable */}
                <div style={{marginTop:"10px",paddingTop:"10px",borderTop:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                    <span style={{fontSize:"10px",color:C.textMuted,flex:1}}>
                      Dépense journalière estimée :
                      <span style={{color:C.gold,fontFamily:"monospace",marginLeft:"4px"}}>{depenseBase()} kcal</span>
                      <span style={{color:C.textMuted,fontSize:"9px",marginLeft:"4px"}}>
                        {parseFloat(depenseReelle)>0?"(personnalisée)":"(valeur app par défaut)"}
                      </span>
                    </span>
                    <input value={depenseReelle} onChange={e=>{
                      const v=e.target.value;
                      if(v===""||(!isNaN(parseFloat(v))&&parseFloat(v)>=1000&&parseFloat(v)<=5000)) saveDepenseReelle(v);
                    }} placeholder="ex: 2500" type="number"
                    style={{...S.input,width:"90px",padding:"5px 8px",fontSize:"12px"}}/>
                  </div>
                  <div style={{fontSize:"9px",color:C.textMuted,marginTop:"4px",lineHeight:"1.4"}}>
                    💡 "Écart dépense" = dépense estimée − calories mangées. Positif = déficit réel, négatif = excès. Ajuste la dépense si tu connais mieux ta valeur réelle.
                  </div>
                </div>
                  <div style={{marginBottom:"10px",display:"flex",alignItems:"center",gap:"8px"}}>
                    <div style={{fontSize:"10px",color:C.textMuted,flexShrink:0}}>🏃 Sport fait aujourd'hui (kcal) :</div>
                    <input value={sportManuel} onChange={e=>{
                      const v=e.target.value;
                      if(v===""||(!isNaN(parseFloat(v))&&parseFloat(v)>=0&&parseFloat(v)<=2000)) setSportManuel(v);
                    }} placeholder="ex: 300" type="number"
                    style={{...S.input,padding:"5px 8px",fontSize:"12px",width:"90px"}}/>
                    {hasSportManuel&&<span style={{fontSize:"10px",color:C.gold}}>cible : {tgt} kcal</span>}
                  </div>
                )}
                {[
                  {label:`Calories · cible ${tgt} kcal`,pct:Math.min(120,cal/tgt*100),over:cal>tgt,c1:C.gold},
                  {label:"Protéines · cible 160-180g",pct:Math.min(120,prot/170*100),over:false,c1:C.blue},
                ].map(bar=>(
                  <div key={bar.label} style={{marginBottom:"8px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                      <span style={{fontSize:"10px",color:C.textSub}}>{bar.label}</span>
                      <span style={{fontSize:"10px",color:C.textMuted,fontFamily:"monospace"}}>{Math.round(bar.pct)}%</span>
                    </div>
                    <div style={{height:"5px",background:"#111",borderRadius:"3px",border:`1px solid ${C.border}`}}>
                      <div style={{height:"100%",width:`${bar.pct}%`,background:bar.over?C.red:bar.c1,borderRadius:"3px",transition:"width .4s"}}/>
                    </div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Protéines par repas — barre de progression */}
          {(()=>{
            const pbm = protByMeal(foodDate);
            const totalProt = Object.values(pbm).reduce((a,v)=>a+v,0);
            if (totalProt === 0) return null;
            const cible = 170;
            return (
              <div style={{...S.card,padding:"12px 14px",marginBottom:"12px"}}>

          {/* 7j chart */}

            const avgCal=Math.round(logged.reduce((a,dk)=>a+dayTotals(dk).cal,0)/logged.length);

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px"}}>
                  {[
                    {val:avgCal,unit:"kcal/j",color:C.gold},
                    {val:`${avgProt}g`,unit:"prot./j",color:C.blue},
                    {val:avgDef>0?`−${avgDef}`:`+${Math.abs(avgDef)}`,unit:"déficit moy.",color:avgDef>0?C.green:C.red},

                    <div key={i} style={{textAlign:"center"}}>
                      <div style={{fontSize:"20px",fontWeight:"300",color:x.color,fontFamily:"monospace"}}>{x.val}</div>
                      <div style={{fontSize:"9px",color:C.textMuted}}>{x.unit}</div>

              </div>

              {key:"tractions",label:"Tractions complètes",target:"Objectif : 1-3 en 8 sem."},

              {key:"planche",  label:"Planche max",         target:"+5s/semaine"},

                  <label style={{fontSize:"13px",color:C.text,fontWeight:"500"}}>{item.label}</label>
                  <span style={{fontSize:"10px",color:C.textMuted}}>{item.target}</span>
                </div>
                <input value={perf[item.key]} onChange={e=>{
                  const v = e.target.value;

                  const lim = limits[item.key]||{min:0,max:9999};
                  if(v===""||(!isNaN(parseFloat(v))&&parseFloat(v)>=lim.min&&parseFloat(v)<=lim.max)) {
                    savePerf({...perf,[item.key]:v});
                    if(item.key==="poids") savePoidsEntry(v);

                    const diff = prev ? (e.poids-prev.poids).toFixed(1) : null;
                    const d = new Date(e.date+"T12:00:00");

                      <div key={e.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#111",borderRadius:"4px"}}>
                        <span style={{fontSize:"11px",color:C.textSub}}>{DAYS_SHORT[(d.getDay()+6)%7]} {d.getDate()}/{d.getMonth()+1}</span>
                        <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                          {diff!==null&&<span style={{fontSize:"10px",color:parseFloat(diff)<0?C.green:parseFloat(diff)>0?C.red:C.textMuted}}>{parseFloat(diff)>0?"+":""}{diff} kg</span>}
                          <span style={{fontSize:"13px",color:C.text,fontFamily:"monospace",fontWeight:"600"}}>{e.poids} kg</span>
                        </div>

                    );

                </div>
              </div>

          </div>

          {/* Notifications */}
          <div style={{...S.card,padding:"14px",marginBottom:"14px"}}>
            <div style={{fontSize:"10px",letterSpacing:"2px",color:C.textMuted,marginBottom:"10px",textTransform:"uppercase",fontFamily:"monospace"}}>Rappels & Notifications</div>

              <div>

          </div>

          <div style={{background:"#1a1500",border:`1.5px solid ${C.gold}`,borderRadius:"8px",padding:"14px"}}>
            <div style={{fontSize:"10px",letterSpacing:"2px",color:C.gold,marginBottom:"10px",textTransform:"uppercase",fontFamily:"monospace"}}>Objectifs 8 semaines</div>
            {[
              ["Perte de poids","1,5 à 2,5 kg réalistes avec le programme"],
              ["1ère traction complète","Très atteignable à 6-8 semaines"],
              ["Déficit cible","300-400 kcal/j · ni trop ni trop peu"],

            ].map(([l,d])=>(
              <div key={l} style={{display:"flex",gap:"10px",marginBottom:"8px"}}>
                <span style={{color:C.gold,flexShrink:0}}>◎</span>

                  <div style={{fontSize:"12px",color:C.goldLight,fontWeight:"600"}}>{l}</div>
                  <div style={{fontSize:"11px",color:C.textSub,marginTop:"2px"}}>{d}</div>
                </div>
              </div>
            ))}
          </div>
        </>}

        {/* ══ HISTORIQUE ══ */}
        {tab==="historique" && <>
          {/* Sélecteur de période */}
          <div style={{display:"flex",gap:"6px",marginBottom:"18px"}}>
            {[7,30,90].map(n=>(
              <button key={n} onClick={()=>setHistRange(n)} style={{flex:1,padding:"9px",background:histRange===n?C.cardHi:"#111",border:histRange===n?`1.5px solid ${C.gold}`:`1px solid ${C.border}`,color:histRange===n?C.gold:C.textMuted,borderRadius:"6px",fontSize:"11px",cursor:"pointer",fontWeight:histRange===n?"700":"400"}}>
                {n===7?"7 jours":n===30?"30 jours":"3 mois"}
              </button>
            ))}
          </div>

          {/* Courbe poids */}
          {poidsHist.length > 1 && (()=>{
            const data = poidsHist.slice(-histRange);
            if (data.length < 2) return null;
            const vals = data.map(e=>e.poids);
            const min = Math.min(...vals)-1, max = Math.max(...vals)+1;
            const range = max-min || 1;
            const W = 320, H = 90;
            const pts = data.map((e,i)=>{
              const x = (i/(data.length-1))*W;
              const y = H - ((e.poids-min)/range)*H;
              return `${x},${y}`;
            }).join(" ");
            const first = data[0].poids, last = data[data.length-1].poids;
            const diff = (last-first).toFixed(1);
            return (
              <div style={{...S.cardHi,padding:"14px",marginBottom:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
                  <div style={{fontSize:"10px",letterSpacing:"2px",color:C.textMuted,textTransform:"uppercase",fontFamily:"monospace"}}>Courbe de poids</div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:"20px",fontWeight:"300",color:diff<=0?C.green:C.red,fontFamily:"monospace"}}>{diff>0?"+":""}{diff} kg</div>
                    <div style={{fontSize:"9px",color:C.textMuted}}>depuis le début</div>
                  </div>
                </div>
                <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"80px",overflow:"visible"}}>
                  <polyline points={pts} fill="none" stroke={diff<=0?C.green:C.red} strokeWidth="2" strokeLinejoin="round"/>
                  {data.map((e,i)=>{
                    const x=(i/(data.length-1))*W, y=H-((e.poids-min)/range)*H;
                    return <circle key={i} cx={x} cy={y} r="3" fill={diff<=0?C.green:C.red}/>;
                  })}
                </svg>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:C.textMuted,fontFamily:"monospace",marginTop:"4px"}}>
                  <span>{data[0].date.slice(5)}</span>
                  <span>{last} kg</span>
                  <span>{data[data.length-1].date.slice(5)}</span>
                </div>
              </div>
            );
          })()}

          {/* Graphique déficit calorique */}
          {(()=>{
            const days = getLastNDays(histRange).filter(dk=>(foods[dk]||[]).length>0);
            if (days.length < 2) return (
              <div style={{...S.card,padding:"14px",marginBottom:"16px",fontSize:"12px",color:C.textMuted,textAlign:"center"}}>
                Pas assez de données nutritionnelles sur cette période
              </div>
            );
            const deficits = days.map(dk=>deficit(dk)||0);
            const maxAbs = Math.max(...deficits.map(Math.abs),1);
            const avgDef = Math.round(deficits.reduce((a,v)=>a+v,0)/deficits.length);
            return (
              <div style={{...S.cardHi,padding:"14px",marginBottom:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
                  <div style={{fontSize:"10px",letterSpacing:"2px",color:C.textMuted,textTransform:"uppercase",fontFamily:"monospace"}}>Écart dépense ({days.length}j logués)</div>
