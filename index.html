                    <div style={{fontSize:"18px",fontWeight:"300",color:avgDef>0?C.green:C.red,fontFamily:"monospace"}}>{avgDef>0?"-":"+"}{ Math.abs(avgDef)}</div>
                    <div style={{fontSize:"9px",color:C.textMuted}}>kcal/j moyen</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:"3px",alignItems:"center",height:"70px"}}>
                  {days.slice(-Math.min(30,days.length)).map((dk,i)=>{
                    const def = deficit(dk)||0;
                    const h = Math.max(2, Math.abs(def)/maxAbs*32);
                    const d = new Date(dk+"T12:00:00");
                    return (
                      <div key={dk} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"70px",gap:"2px"}}>
                        {def>0&&<div style={{width:"100%",height:`${h}px`,background:C.green,borderRadius:"2px 2px 0 0"}}/>}
                        <div style={{width:"1px",height:"1px",background:C.border}}/>
                        {def<0&&<div style={{width:"100%",height:`${h}px`,background:C.red,borderRadius:"0 0 2px 2px"}}/>}
                      </div>
                    );
                  })}
                </div>
                <div style={{fontSize:"9px",color:C.textMuted,marginTop:"4px",textAlign:"center"}}>🟢 déficit · 🔴 excès</div>
              </div>
            );
          })()}

          {/* Projection perte de poids */}
          {(()=>{
            const loggedDays = getLastNDays(Math.min(histRange,30)).filter(dk=>(foods[dk]||[]).length>0);
            if (loggedDays.length < 3) return null;
            const avgDef = loggedDays.reduce((a,dk)=>a+(deficit(dk)||0),0)/loggedDays.length;
            // 7700 kcal ≈ 1 kg de graisse
            const kgPerWeek = (avgDef * 7) / 7700;
            const kgIn30j = (avgDef * 30) / 7700;
            const kgIn60j = (avgDef * 60) / 7700;
            const poidsActuel = parseFloat(perf.poids) || 78;
            return (
              <div style={{background:"#1a1500",border:`1.5px solid ${C.gold}`,borderRadius:"8px",padding:"14px",marginBottom:"16px"}}>
                <div style={{fontSize:"10px",letterSpacing:"2px",color:C.gold,marginBottom:"12px",textTransform:"uppercase",fontFamily:"monospace"}}>
                  Projection · basée sur {loggedDays.length}j logués
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"10px"}}>
                  {[
                    {val:`${Math.abs(kgPerWeek).toFixed(2)} kg`,label:"par semaine",color:avgDef>0?C.green:C.red},
                    {val:`${Math.abs(kgIn30j).toFixed(1)} kg`,label:"en 30 jours",color:avgDef>0?C.green:C.red},
                    {val:`${Math.abs(kgIn60j).toFixed(1)} kg`,label:"en 60 jours",color:avgDef>0?C.green:C.red},
                  ].map((x,i)=>(
                    <div key={i} style={{textAlign:"center"}}>
                      <div style={{fontSize:"17px",fontWeight:"300",color:x.color,fontFamily:"monospace"}}>{avgDef>0?"−":"+"}{x.val}</div>
                      <div style={{fontSize:"9px",color:C.textMuted,marginTop:"2px"}}>{x.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:"11px",color:C.textSub}}>
                  Déficit moyen : <span style={{color:avgDef>0?C.green:C.red,fontFamily:"monospace",fontWeight:"600"}}>{avgDef>0?"-":"+"}{Math.abs(Math.round(avgDef))} kcal/j</span>
                  {poidsActuel && kgIn60j > 0 && <span style={{color:C.textMuted}}> · Poids estimé à 8 sem. : <span style={{color:C.gold,fontFamily:"monospace"}}>{(poidsActuel-kgIn60j).toFixed(1)} kg</span></span>}
                </div>
                {avgDef < 100 && avgDef >= 0 && (
                  <div style={{fontSize:"10px",color:C.gold,marginTop:"8px"}}>⚠️ Déficit très faible — vérifie que tes séances sport sont bien loggées</div>
                )}
                {avgDef < 0 && (
                  <div style={{fontSize:"10px",color:C.red,marginTop:"8px"}}>⚠️ Excès calorique moyen — ajuste tes apports</div>
                )}
              </div>
            );
          })()}

          {/* Historique séances */}
          {(()=>{
            const days = getLastNDays(histRange);
            const doneDays = days.filter(dk=>sessions[dk]?.done && !sessions[dk]?.estRepos);
            const totalMin = doneDays.reduce((s,dk)=>s+(parseFloat(sessions[dk]?.duree)||0),0);
            const byType = {};
            doneDays.forEach(dk=>{
              (sessions[dk].activites||[]).forEach(a=>{
                byType[a]=(byType[a]||0)+1;
              });
            });
            const LABELS={course_ef:"Course EF",fractionne:"Fractionné",calistenie:"Calisthénie",marche:"Marche",velo:"Vélo",natation:"Natation",yoga:"Yoga",autre:"Autre"};
            return (
              <div style={{...S.cardHi,padding:"14px",marginBottom:"16px"}}>
                <div style={{fontSize:"10px",letterSpacing:"2px",color:C.textMuted,marginBottom:"12px",textTransform:"uppercase",fontFamily:"monospace"}}>Activités ({days.length}j)</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                  {[
                    {val:doneDays.length,label:"Séances",color:C.gold},
                    {val:`${totalMin}min`,label:"Temps total",color:C.blue},
                    {val:doneDays.length>0?Math.round(totalMin/doneDays.length)+"min":"—",label:"Durée moy.",color:C.green},
                  ].map((x,i)=>(
                    <div key={i} style={{textAlign:"center"}}>
                      <div style={{fontSize:"18px",fontWeight:"300",color:x.color,fontFamily:"monospace"}}>{x.val}</div>
                      <div style={{fontSize:"9px",color:C.textMuted,marginTop:"2px"}}>{x.label}</div>
                    </div>
                  ))}
                </div>
                {Object.entries(byType).length>0&&(
                  <div>
                    <div style={{fontSize:"9px",color:C.textMuted,marginBottom:"6px",letterSpacing:"1px"}}>PAR TYPE</div>
                    {Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([type,count])=>(
                      <div key={type} style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
                        <span style={{fontSize:"11px",color:C.textSub,width:"100px",flexShrink:0}}>{LABELS[type]||type}</span>
                        <div style={{flex:1,height:"4px",background:"#111",borderRadius:"2px"}}>
                          <div style={{height:"100%",width:`${count/doneDays.length*100}%`,background:C.gold,borderRadius:"2px"}}/>
                        </div>
                        <span style={{fontSize:"11px",color:C.textMuted,fontFamily:"monospace",width:"30px",textAlign:"right"}}>{count}x</span>
                      </div>
                    ))}
                  </div>
                )}
                {/* Journal des dernières séances */}
                <div style={{marginTop:"14px"}}>
                  <div style={{fontSize:"9px",color:C.textMuted,marginBottom:"8px",letterSpacing:"1px"}}>DERNIÈRES SÉANCES</div>
                  {doneDays.slice(-8).reverse().map(dk=>{
                    const s = sessions[dk];
                    const d = new Date(dk+"T12:00:00");
                    return (
                      <div key={dk} style={{...S.card,padding:"9px 12px",marginBottom:"5px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:"12px",color:C.text}}>{DAYS_FULL[(d.getDay()+6)%7]} {d.getDate()}/{d.getMonth()+1}</div>
                          <div style={{fontSize:"10px",color:C.textMuted,marginTop:"2px"}}>{(s.activites||[]).map(a=>LABELS[a]||a).join(" + ")}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:"13px",color:C.gold,fontFamily:"monospace"}}>{s.duree||"—"}min</div>
                          <div style={{fontSize:"12px"}}>{RESSENTI[+s.ressenti]||""}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}
        </>}

        {/* ══ RÉFÉRENCE ══ */}
        {tab==="reference" && <>
          {Object.entries(CALISTENIE_BLOCS).map(([bloc,exos])=>(
            <div key={bloc} style={{...S.card,padding:"14px 16px",marginBottom:"10px"}}>
              <div style={{fontSize:"10px",color:C.gold,letterSpacing:"3px",marginBottom:"10px",textTransform:"uppercase",fontFamily:"monospace",fontWeight:"700"}}>Bloc {bloc}</div>
              {exos.map(e=>(
                <div key={e.ex} style={{display:"flex",justifyContent:"space-between",marginBottom:"8px",alignItems:"center"}}>
                  <span style={{fontSize:"13px",color:C.text,fontWeight:"500"}}>{e.ex}</span>
                  <span style={{fontSize:"11px",color:C.textSub,fontFamily:"monospace"}}>{e.sets}</span>
                </div>
              ))}
            </div>
          ))}

          <div style={{...S.card,padding:"14px 16px",marginBottom:"10px"}}>
            <div style={{fontSize:"10px",color:C.green,letterSpacing:"3px",marginBottom:"10px",textTransform:"uppercase",fontFamily:"monospace",fontWeight:"700"}}>Étirements post-séance</div>
            {STRETCHES.map((s,i)=>(
              <div key={s.name} style={{display:"flex",gap:"10px",marginBottom:"9px",alignItems:"center"}}>
                <div style={{width:"22px",height:"22px",borderRadius:"50%",background:s.priority?"#1a3a12":"#222",border:`1.5px solid ${s.priority?C.green:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:s.priority?C.green:C.textMuted,flexShrink:0,fontWeight:"700"}}>{i+1}</div>
                <div style={{flex:1,fontSize:"13px",color:s.priority?C.text:C.textSub,fontWeight:s.priority?"600":"400"}}>{s.name}</div>
                <span style={{fontSize:"11px",color:C.textMuted,fontFamily:"monospace"}}>{s.duration}</span>
              </div>
            ))}
          </div>

          {[
            {icon:"◎",col:C.blue,    label:"EF — Endurance fondamentale",detail:"7:00-7:30/km · pouvoir parler sans essoufflement · 60-70% FC max"},
            {icon:"◉",col:"#7a8fd4", label:"Fractionné",detail:"6 × 1min rapide / 1min récup · ou 20 min à ~5:30/km"},
            {icon:"◇",col:C.green,   label:"Règle 80/20",detail:"80% du volume en EF — ne jamais tricher sur la lenteur"},
          ].map(r=>(
            <div key={r.label} style={{...S.card,padding:"13px 15px",marginBottom:"8px",display:"flex",gap:"13px"}}>
              <span style={{color:r.col,fontSize:"16px",flexShrink:0,marginTop:"1px"}}>{r.icon}</span>
              <div>
                <div style={{fontSize:"13px",color:C.text,fontWeight:"600",marginBottom:"4px"}}>{r.label}</div>
                <div style={{fontSize:"11px",color:C.textSub,lineHeight:"1.6"}}>{r.detail}</div>
              </div>
            </div>
          ))}
        </>}
      </div>

      {/* ── MODAL SESSION ── */}
      {sessModal && (()=>{
        const idx = weekDates.indexOf(sessModal);
        const prevu = idx !== -1 ? DEFAULT_WEEK_PLAN[idx] : null;

        const ACTIVITES = [
          {id:"course_ef",  label:"Course EF",        icon:"◎", metMin:9},
          {id:"fractionne", label:"Fractionné",        icon:"◉", metMin:12},
          {id:"calistenie", label:"Calisthénie",       icon:"◈", metMin:5},
          {id:"marche",     label:"Marche",            icon:"◇", metMin:4},
          {id:"velo",       label:"Vélo",              icon:"○", metMin:8},
          {id:"natation",   label:"Natation",          icon:"◌", metMin:8},
          {id:"yoga",       label:"Yoga / Étirements", icon:"◫", metMin:3},
          {id:"autre",      label:"Autre",             icon:"·", metMin:5},
        ];

        // Exercices calisthénie avec MET et kcal/min estimés pour 78kg
        const CALI_EXOS = [
          {id:"planche",      label:"Planche",               kcalMin:3.5, sets:"3 × 45s"},
          {id:"planche_lat",  label:"Planche latérale",      kcalMin:3.0, sets:"2 × 30s/côté"},
          {id:"releve_jambes",label:"Relevés de jambes",     kcalMin:4.0, sets:"3 × 12"},
          {id:"tuck_lsit",    label:"Tuck L-sit",            kcalMin:4.5, sets:"2 × 10s"},
          {id:"traction_neg", label:"Tractions négatives",   kcalMin:5.5, sets:"3 × 5"},
          {id:"traction",     label:"Tractions complètes",   kcalMin:6.0, sets:"3 × max"},
          {id:"dead_hang",    label:"Dead hang",             kcalMin:3.0, sets:"2 × 25s"},
          {id:"dips",         label:"Dips",                  kcalMin:5.0, sets:"3 × 8"},
          {id:"pompes",       label:"Pompes",                kcalMin:4.5, sets:"3 × max"},
          {id:"pike_pushup",  label:"Pike push-up",          kcalMin:4.0, sets:"2 × 8"},
          {id:"squat",        label:"Squats",                kcalMin:5.0, sets:"3 × 15"},
          {id:"fentes",       label:"Fentes",                kcalMin:5.0, sets:"3 × 12"},
          {id:"gainage_total",label:"Gainage complet",       kcalMin:4.0, sets:"circuit"},
          {id:"burpees",      label:"Burpees",               kcalMin:8.0, sets:"3 × 10"},
          {id:"mountain_cl",  label:"Mountain climbers",     kcalMin:7.0, sets:"3 × 30s"},
        ];

        const LABELS = {course_ef:"Course EF",fractionne:"Fractionné",calistenie:"Calisthénie",marche:"Marche",velo:"Vélo",natation:"Natation",yoga:"Yoga",autre:sessForm.activiteCustom||"Autre"};
        const activites = sessForm.activites || [];
        const durees = sessForm.durees || {};
        const exosCali = sessForm.exosCali || [];

        function toggleActivite(id) {
          setSessForm(f => {
            const cur = f.activites || [];
            const next = cur.includes(id) ? cur.filter(x=>x!==id) : [...cur, id];
            return {...f, activites: next, estRepos: false};
          });
        }

        function toggleExoCali(id) {
          setSessForm(f => {
            const cur = f.exosCali || [];
            return {...f, exosCali: cur.includes(id) ? cur.filter(x=>x!==id) : [...cur, id]};
          });
        }

        function setDuree(actId, val) {
          setSessForm(f => ({...f, durees: {...(f.durees||{}), [actId]: val}}));
        }

        function setAllure(actId, val) {
          setSessForm(f => ({...f, allures: {...(f.allures||{}), [actId]: val}}));
        }

        const allures = sessForm.allures || {};

        // Formule Minetti et al. pour la course, MET corrigé pour le reste
        function estimateCal() {
          let total = 0;
          const poids = 78;
          activites.forEach(actId => {
            const act = ACTIVITES.find(a=>a.id===actId);
            const dur = parseFloat(durees[actId]) || 0;
            if (!act || dur === 0) return;

            if ((actId === "course_ef" || actId === "fractionne") && allures[actId]) {
              // Formule Minetti : 0.9 kcal/kg/km, modulée légèrement par l'allure
              const allureMin = parseFloat(allures[actId]);
              if (!isNaN(allureMin) && allureMin > 0) {
                const vitesseKmh = 60 / allureMin;
                const distKm = vitesseKmh * (dur / 60);
                // Légère correction anaérobie si allure < 5 min/km (+8%)
                const coeff = allureMin < 5 ? 1.08 : 1.0;
                total += Math.round(0.9 * poids * distKm * coeff);
                return;
              }
            }
            if (actId === "calistenie" && exosCali.length > 0) {
              const avgKcal = exosCali.reduce((s,eid)=>{
                const ex = CALI_EXOS.find(e=>e.id===eid);
                return s + (ex?.kcalMin||5);
              },0) / exosCali.length;
              total += Math.round(avgKcal * dur * 0.5);
            } else if (actId === "calistenie") {
              total += Math.round((act.metMin * poids * dur * 0.5) / 200);
            } else {
              total += Math.round((act.metMin * poids * dur) / 200);
            }
          });
          return total;
        }

        const totalDuree = activites.reduce((s,a)=>s+(parseFloat(durees[a])||0),0);
        const calEstim = estimateCal();

        return (
          <div style={{position:"fixed",inset:0,background:C.overlay,zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
            onClick={()=>setSessModal(null)}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#1a1a1a",border:`2px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:"22px 18px",width:"100%",maxWidth:"480px",maxHeight:"93vh",overflowY:"auto"}}>

              <div style={{fontSize:"10px",letterSpacing:"3px",color:C.textMuted,marginBottom:"14px",textTransform:"uppercase",fontFamily:"monospace"}}>
                Logger · {DAYS_FULL[idx]||"—"}{prevu?` · Prévu : ${prevu.label}`:""}
              </div>

              {/* Repos toggle */}
              <div style={{marginBottom:"14px"}}>
                <label style={S.label}>Type de journée</label>
                <div style={{display:"flex",gap:"8px"}}>
                  <button onClick={()=>setSessForm(f=>({...f,estRepos:false,activites:f.activites?.length?f.activites:(prevu?.type==="repos"?[]:prevu?.type==="course"?["course_ef"]:["calistenie"])}))} style={{
                    flex:1,padding:"10px",background:!sessForm.estRepos?"#2a2000":"#1e1e1e",
                    border:!sessForm.estRepos?`1.5px solid ${C.gold}`:`1.5px solid ${C.border}`,
                    color:!sessForm.estRepos?C.gold:C.textMuted,borderRadius:"6px",cursor:"pointer",fontSize:"12px",fontWeight:!sessForm.estRepos?"700":"400",
                  }}>💪 Activité</button>
                  <button onClick={()=>setSessForm(f=>({...f,estRepos:true,activites:[],durees:{},exosCali:[]}))} style={{
                    flex:1,padding:"10px",background:sessForm.estRepos?"#0a1a2a":"#1e1e1e",
                    border:sessForm.estRepos?`1.5px solid ${C.blue}`:`1.5px solid ${C.border}`,
                    color:sessForm.estRepos?C.blue:C.textMuted,borderRadius:"6px",cursor:"pointer",fontSize:"12px",fontWeight:sessForm.estRepos?"700":"400",
                  }}>◇ Repos / Récup</button>
                </div>
              </div>

              {!sessForm.estRepos && <>
                {/* Sélection activités */}
                <div style={{marginBottom:"14px"}}>
                  <label style={S.label}>Activité(s) <span style={{color:C.textMuted,fontWeight:"400"}}>(multi-sélection)</span></label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                    {ACTIVITES.map(a=>{
                      const sel = activites.includes(a.id);
                      return (
                        <button key={a.id} onClick={()=>toggleActivite(a.id)} style={{
                          padding:"6px 10px",
                          background:sel?"#2a2000":"#1e1e1e",
                          border:sel?`1.5px solid ${C.gold}`:`1.5px solid ${C.border}`,
                          color:sel?C.gold:C.textSub,
                          borderRadius:"6px",fontSize:"11px",cursor:"pointer",fontWeight:sel?"700":"400",
                        }}>{a.icon} {a.label}</button>
                      );
                    })}
                  </div>
                  {activites.includes("autre") && (
                    <input value={sessForm.activiteCustom||""} onChange={e=>setSessForm(f=>({...f,activiteCustom:e.target.value}))}
                      placeholder="Préciser…" style={{...S.input,marginTop:"8px"}}/>
                  )}
                </div>

                {/* Durée + allure par activité */}
                {activites.length > 0 && (
                  <div style={{marginBottom:"14px"}}>
                    <label style={S.label}>Durée & détails par activité</label>
                    {activites.map(actId=>{
                      const act = ACTIVITES.find(a=>a.id===actId);
                      const isCourse = actId==="course_ef"||actId==="fractionne";
                      const dur = parseFloat(durees[actId])||0;
                      const allure = allures[actId]||"";
                      // Calcul distance si allure renseignée
                      const dist = (isCourse && allure && dur) ? (60/parseFloat(allure)*dur/60).toFixed(1) : null;
                      return (
                        <div key={actId} style={{marginBottom:"12px",background:"#111",border:`1px solid ${C.border}`,borderRadius:"6px",padding:"10px 12px"}}>
                          <div style={{fontSize:"12px",color:C.text,fontWeight:"600",marginBottom:"8px"}}>{act?.icon} {LABELS[actId]}</div>
                          <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:"9px",color:C.textMuted,marginBottom:"4px",letterSpacing:"1px"}}>DURÉE (min)</div>
                              <input value={durees[actId]||""} onChange={e=>setDuree(actId,e.target.value)}
                                placeholder="ex: 45" type="number"
                                style={{...S.input,padding:"8px",textAlign:"center"}}/>
                            </div>
                            {isCourse && (
                              <div style={{flex:1}}>
                                <div style={{fontSize:"9px",color:C.textMuted,marginBottom:"4px",letterSpacing:"1px"}}>ALLURE (min/km)</div>
                                <input value={allure} onChange={e=>setAllure(actId,e.target.value)}
                                  placeholder="ex: 7.0" type="number" step="0.1"
                                  style={{...S.input,padding:"8px",textAlign:"center"}}/>
                              </div>
                            )}
                          </div>
                          {isCourse && dist && dur > 0 && (
                            <div style={{fontSize:"10px",color:C.green,marginTop:"6px",fontFamily:"monospace"}}>
                              📍 Distance estimée : {dist} km
                            </div>
                          )}
                        </div>
                      );
                    })}
                    {totalDuree > 0 && (
                      <div style={{fontSize:"11px",color:C.textMuted,marginTop:"4px",fontFamily:"monospace"}}>
                        Total : {totalDuree} min
                        {calEstim > 0 && <span style={{color:C.gold}}> · ≈ {calEstim} kcal <span style={{color:C.textMuted,fontSize:"10px"}}>(Minetti pour la course, ×0.5 pour calisthénie)</span></span>}
                      </div>
                    )}
                  </div>
                )}

                {/* Détail calisthénie */}
                {activites.includes("calistenie") && (
                  <div style={{marginBottom:"14px"}}>
                    <label style={S.label}>Exercices calisthénie <span style={{color:C.textMuted,fontWeight:"400"}}>(optionnel — affine le calcul)</span></label>
                    <div style={{background:"#111",border:`1px solid ${C.border}`,borderRadius:"6px",padding:"10px",display:"flex",flexDirection:"column",gap:"5px",maxHeight:"220px",overflowY:"auto"}}>
                      {CALI_EXOS.map(ex=>{
                        const sel = exosCali.includes(ex.id);
                        return (
                          <button key={ex.id} onClick={()=>toggleExoCali(ex.id)} style={{
                            display:"flex",justifyContent:"space-between",alignItems:"center",
                            padding:"8px 10px",
                            background:sel?"#1e2a10":"#1a1a1a",
                            border:sel?`1px solid ${C.green}`:`1px solid ${C.border}`,
                            color:sel?C.green:C.textSub,
                            borderRadius:"5px",cursor:"pointer",textAlign:"left",
                          }}>
                            <span style={{fontSize:"12px",fontWeight:sel?"600":"400"}}>{sel?"✓ ":""}{ex.label}</span>
                            <span style={{fontSize:"10px",color:C.textMuted,fontFamily:"monospace"}}>≈{ex.kcalMin} kcal/min</span>
                          </button>
                        );
                      })}
                    </div>
                    {exosCali.length > 0 && (
                      <div style={{fontSize:"10px",color:C.textMuted,marginTop:"6px",padding:"6px 8px",background:"#111",borderRadius:"4px"}}>
                        💡 Valeurs indicatives (Ciqual/ACSM) pour 78 kg · repos inclus · ±20% selon intensité
                      </div>
                    )}
                  </div>
                )}

                {/* Résumé */}
                {activites.length > 0 && (
                  <div style={{padding:"9px 12px",background:"#1a1500",border:`1px solid ${C.gold}`,borderRadius:"6px",fontSize:"11px",color:C.gold,marginBottom:"14px"}}>
                    {activites.length>1?"Combiné : ":""}{activites.map(a=>LABELS[a]).join(" + ")}
                    {prevu&&prevu.type!=="repos"&&!activites.some(a=>prevu.label.toLowerCase().includes(a.replace("_"," ").split("_")[0]))&&
                      <span style={{color:C.textSub}}> · (prévu : {prevu.label})</span>}
                  </div>
                )}

                {/* Ressenti */}
                <div style={{marginBottom:"13px"}}>
                  <label style={S.label}>Ressenti global</label>
                  <div style={{display:"flex",gap:"6px"}}>
                    {["1","2","3","4","5"].map(v=>(
                      <button key={v} onClick={()=>setSessForm(f=>({...f,ressenti:v}))} style={{
                        flex:1,padding:"10px 3px",
                        background:sessForm.ressenti===v?"#2a2000":"#1e1e1e",
                        border:sessForm.ressenti===v?`2px solid ${C.gold}`:`1.5px solid ${C.border}`,
                        borderRadius:"6px",cursor:"pointer",fontSize:"20px",
                      }}>{RESSENTI[+v]}</button>
                    ))}
                  </div>
                </div>
              </>}

              {/* Note */}
              <div style={{marginBottom:"18px"}}>
                <label style={S.label}>Note</label>
                <textarea value={sessForm.note} onChange={e=>setSessForm(f=>({...f,note:e.target.value}))}
                  placeholder={sessForm.estRepos?"Récupération, étirements, marche légère…":"Sensations, allure, douleurs, météo…"}
                  rows={2} style={{...S.input,resize:"none"}}/>
              </div>

              <div style={{display:"flex",gap:"10px"}}>
                <button onClick={()=>saveSession(sessModal)} style={{flex:1,padding:"13px",background:C.gold,color:"#111",border:"none",borderRadius:"6px",fontSize:"12px",fontWeight:"800",cursor:"pointer",letterSpacing:"1px"}}>VALIDER</button>
                {sessions[sessModal]?.done&&<button onClick={()=>delSession(sessModal)} style={{padding:"13px 15px",background:"none",color:C.red,border:`1.5px solid ${C.red}`,borderRadius:"6px",fontSize:"11px",cursor:"pointer"}}>Effacer</button>}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── MODAL FOOD ── */}
      {foodModal && (
        <div style={{position:"fixed",inset:0,background:C.overlay,zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={()=>{setFoodModal(false);setSearch("");setCatFilter("Tout");setPicked(null);setQty("");}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1a1a1a",border:`2px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:"20px 18px",width:"100%",maxWidth:"480px",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontSize:"10px",letterSpacing:"3px",color:C.textMuted,marginBottom:"14px",textTransform:"uppercase",fontFamily:"monospace"}}>
              Ajouter · {(()=>{const d=new Date(foodDate+"T12:00:00");return `${d.getDate()}/${d.getMonth()+1}`;})()}
            </div>

            {/* Repas */}
            <div style={{marginBottom:"12px"}}>
              <label style={S.label}>Repas</label>
              <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
                {MEALS.map(m=>(
                  <button key={m} onClick={()=>setMeal(m)} style={S.tag(meal===m)}>{m}</button>
                ))}
              </div>
            </div>

            {/* Mode */}
            <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
              {[["db","Base alimentaire"],["custom","Saisie libre"]].map(([id,label])=>(
                <button key={id} onClick={()=>setMode(id)} style={{flex:1,padding:"8px",background:mode===id?C.cardHi:"#111",border:mode===id?`1.5px solid ${C.gold}`:`1.5px solid ${C.border}`,color:mode===id?C.gold:C.textMuted,borderRadius:"6px",fontSize:"10px",cursor:"pointer",letterSpacing:"1px",fontWeight:mode===id?"700":"400"}}>{label}</button>
              ))}
            </div>

            {mode==="db"?<>
              {/* Récents */}
              {recentFoods.length > 0 && !search && catFilter === "Tout" && !picked && (
                <div style={{marginBottom:"10px"}}>
                  <div style={{fontSize:"9px",color:C.textMuted,letterSpacing:"2px",marginBottom:"6px",textTransform:"uppercase",fontFamily:"monospace"}}>Récents</div>
                  <div style={{display:"flex",flexDirection:"column",gap:"3px",maxHeight:"150px",overflowY:"auto"}}>
                    {recentFoods.map(e=>(
                      <button key={e.name} onClick={()=>{
                        const f = FOOD_DB.find(x=>x.name===e.name);
                        if (f) { setPicked(f); setSearch(f.name); }
                        else { setPicked({name:e.name,cal100:e.cal,prot100:e.prot,unit:"g",unitG:100,cat:"Tout"}); setSearch(e.name); }
                      }} style={{background:"#111",border:`1px solid ${C.border}`,color:C.text,padding:"7px 12px",borderRadius:"5px",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",fontSize:"12px"}}>
                        <span>{e.name}</span>
                        <span style={{fontSize:"10px",color:C.textMuted,fontFamily:"monospace"}}>{e.cal} kcal</span>
                      </button>
                    ))}
                  </div>
                  <div style={{height:"1px",background:C.border,margin:"10px 0"}}/>
                </div>
              )}
              {/* Catégories */}
              <div style={{marginBottom:"8px",overflowX:"auto",whiteSpace:"nowrap",paddingBottom:"4px"}}>
                {FOOD_CATS.map(c=>(
                  <button key={c} onClick={()=>{setCatFilter(c);setPicked(null);}} style={{...S.tag(catFilter===c),display:"inline-block",marginRight:"5px",whiteSpace:"nowrap"}}>{c}</button>
                ))}
              </div>
              <input value={search} onChange={e=>{setSearch(e.target.value);setPicked(null);}} placeholder={`Chercher${catFilter!=="Tout"?` dans ${catFilter}`:""}…`} style={{...S.input,marginBottom:"8px"}}/>
              <div style={{display:"flex",flexDirection:"column",gap:"4px",maxHeight:"200px",overflowY:"auto",marginBottom:"10px"}}>
                {filteredDB.map(f=>(
                  <button key={f.name} onClick={()=>{setPicked(f);setSearch(f.name);}} style={{
                    background:picked?.name===f.name?"#2a2000":"#111",
                    border:picked?.name===f.name?`1.5px solid ${C.gold}`:`1px solid ${C.border}`,
                    color:C.text,padding:"9px 12px",borderRadius:"5px",cursor:"pointer",
                    textAlign:"left",display:"flex",justifyContent:"space-between",fontSize:"13px",
                  }}>
                    <span style={{fontWeight:picked?.name===f.name?"600":"400"}}>{f.name}</span>
                    <span style={{fontSize:"11px",color:C.textMuted,fontFamily:"monospace"}}>{f.cal100} kcal/{f.unit==="g"||f.unit==="ml"?"100"+f.unit:f.unit}</span>
                  </button>
                ))}
                {filteredDB.length===0&&search&&<div style={{fontSize:"11px",color:C.textMuted,padding:"10px",textAlign:"center"}}>Aucun résultat — essaie d'autres termes</div>}
              </div>
              {picked&&<>
                <label style={S.label}>Quantité ({picked.unit==="g"?"grammes":picked.unit==="ml"?"ml":picked.unit==="unité"?"unités":picked.unit})</label>
                <input value={qty} onChange={e=>{
                  const v=e.target.value;
                  if(v===""||(!isNaN(parseFloat(v))&&parseFloat(v)>=0)) setQty(v);
                }} placeholder={picked.unit==="g"||picked.unit==="ml"?`ex: ${picked.unitG}`:"ex: 1"} type="number"
                style={{...S.input,marginBottom:"6px",border:`1.5px solid ${qty&&parseFloat(qty)<=0?C.red:C.border}`}}/>
                {qty&&parseFloat(qty)<=0&&<div style={{fontSize:"10px",color:C.red,marginBottom:"6px"}}>Quantité doit être supérieure à 0</div>}
                {qty&&parseFloat(qty)>0&&<div style={{padding:"8px 12px",background:"#111",border:`1px solid ${C.border}`,borderRadius:"5px",fontSize:"12px",color:C.gold,marginBottom:"10px",fontFamily:"monospace"}}>
                  {(()=>{const r=calcQty(picked,qty);return `≈ ${r.cal} kcal · ${r.prot}g protéines`;})()}
                </div>}
              </>}
            </>:<>
              <label style={S.label}>Nom du repas / aliment</label>
              <input value={custom.name} onChange={e=>setCustom(c=>({...c,name:e.target.value}))} placeholder="ex: Salade maison" style={{...S.input,marginBottom:"8px"}}/>
              <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
                <div style={{flex:1}}>
                  <label style={S.label}>Calories (kcal)</label>
                  <input value={custom.cal} onChange={e=>{
                    const v=e.target.value;
                    if(v===""||(!isNaN(parseFloat(v))&&parseFloat(v)>=0&&parseFloat(v)<=9999)) setCustom(c=>({...c,cal:v}));
                  }} placeholder="ex: 450" type="number"
                  style={{...S.input,border:`1.5px solid ${custom.cal&&(isNaN(parseFloat(custom.cal))||parseFloat(custom.cal)<0)?C.red:C.border}`}}/>
                  {custom.cal&&(isNaN(parseFloat(custom.cal))||parseFloat(custom.cal)<0)&&<div style={{fontSize:"10px",color:C.red,marginTop:"3px"}}>Valeur invalide</div>}
                </div>
                <div style={{flex:1}}>
                  <label style={S.label}>Protéines (g)</label>
                  <input value={custom.prot} onChange={e=>{
                    const v=e.target.value;
                    if(v===""||(!isNaN(parseFloat(v))&&parseFloat(v)>=0&&parseFloat(v)<=500)) setCustom(c=>({...c,prot:v}));
                  }} placeholder="ex: 25" type="number"
                  style={{...S.input,border:`1.5px solid ${custom.prot&&(isNaN(parseFloat(custom.prot))||parseFloat(custom.prot)<0)?C.red:C.border}`}}/>
                </div>
              </div>
            </>}

            {(()=>{
              const canAdd = (mode==="db"&&picked&&qty&&parseFloat(qty)>0) || (mode==="custom"&&custom.name&&custom.cal&&parseFloat(custom.cal)>0);
              return (
                <button onClick={addFood} disabled={!canAdd} style={{width:"100%",padding:"14px",background:canAdd?C.gold:"#333",color:canAdd?"#111":C.textMuted,border:"none",borderRadius:"6px",fontSize:"12px",fontWeight:"800",cursor:canAdd?"pointer":"not-allowed",letterSpacing:"1px",transition:"all .2s"}}>AJOUTER</button>
              );
            })()}
          </div>
        </div>
      )}

      {/* ── TOAST ── */}
      {toast && (
        <div style={{
          position:"fixed", bottom:"24px", left:"50%", transform:"translateX(-50%)",
          background: toast.type==="success" ? "#1a3a12" : "#3a1212",
          border: `1.5px solid ${toast.type==="success" ? C.green : C.red}`,
          color: toast.type==="success" ? C.green : C.red,
          padding:"10px 20px", borderRadius:"8px", fontSize:"13px", fontWeight:"600",
          zIndex:500, whiteSpace:"nowrap", boxShadow:"0 4px 20px rgba(0,0,0,0.5)",
          animation:"fadeIn .2s ease",
        }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
